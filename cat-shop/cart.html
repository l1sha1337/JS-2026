<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Твои котики:</h1>
    <div id="cart-list"></div>
    <a href="main.html">Назад</a>

    <script src="script.js"></script>
    <script>
        const list = document.getElementById('cart-list');
        for (let i = 0; i < items.length; i++) {
            let cat = items[i];
            list.innerHTML += `
                <div class="card">
                    <img src="${cat.img}">
                    <h2>${cat.name}</h2>
                    <button onclick="removeFromCart(${i})">Забрать домой</button>
                </div>
            `;
        }
    </script>
</body>
