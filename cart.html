<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Корзина — Приют котиков</title>
</head>
<body>
    <nav>
        <a href="main.html">Главная</a>
        <a href="cart.html">Корзина</a>
        <a href="main.html#footer">О приюте</a>
        <button id="theme-btn" onclick="toggleTheme()" style="background: none; border: none; padding: 5px 10px; width: auto; cursor: pointer; font-size: 18px;">🌙</button>
    </nav>

    <h1>Твои котики:</h1>
    <div id="cart-list"></div>
    <a href="main.html">← Назад к выбору</a>

    <footer>
        <p>Приют котиков — дарим тепло и уют!</p>
        <p>Связь: <a href="mailto:cats@priut.ru">cats@priut.ru</a></p>
    </footer>

    <script src="script.js"></script>
    <script>
        let list = document.getElementById('cart-list');
        for (let i = 0; i < cart.length; i++) {
            list.innerHTML += `
                <div class="card">
                    <img src="${cart[i].img}">
                    <h2>${cart[i].name}</h2>
                    <button onclick="removeFromCart(${i})">Забрать домой</button>
                </div>
            `;
        }
    </script>
</body>
</html>
